<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成为/已是注册用户 · 心研坊</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=46">
    <style>
        .auth-page {
            min-height: 100vh;
            padding: 28px 20px 40px;
            background:
                radial-gradient(circle at 14% 12%, rgba(204, 120, 92, 0.12), transparent 26%),
                radial-gradient(circle at 86% 18%, rgba(47, 111, 176, 0.08), transparent 24%),
                var(--canvas);
            box-sizing: border-box;
        }
        .auth-shell {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: minmax(0, 1.05fr) minmax(360px, 0.95fr);
            gap: 28px;
            align-items: center;
        }
        .auth-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 22px;
        }
        .auth-copy {
            padding: 12px 0;
        }
        .auth-eyebrow {
            margin: 0 0 12px;
            color: var(--primary);
            font-size: 0.92rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .auth-title {
            margin: 0 0 16px;
            font-size: clamp(2.6rem, 4.6vw, 4.3rem);
            line-height: 1.05;
            color: var(--ink);
        }
        .auth-intro {
            max-width: 40rem;
            margin: 0 0 22px;
            font-size: 1.14rem;
            line-height: 1.85;
            color: var(--body);
        }
        .auth-summary {
            display: grid;
            gap: 12px;
            max-width: 38rem;
        }
        .auth-summary-item {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            padding: 14px 16px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid var(--hairline);
            box-shadow: 0 10px 24px rgba(50, 40, 35, 0.08);
        }
        .auth-summary-item i {
            color: var(--primary);
            font-size: 1.05rem;
            margin-top: 2px;
        }
        .auth-summary-item strong {
            display: block;
            margin-bottom: 4px;
            font-size: 1rem;
        }
        .auth-summary-item span {
            color: var(--muted);
            font-size: 0.93rem;
            line-height: 1.55;
        }
        .auth-panel {
            padding: 28px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(230, 223, 216, 0.96);
            box-shadow: 0 20px 48px rgba(50, 40, 35, 0.12);
            -webkit-backdrop-filter: blur(12px) saturate(1.08);
            backdrop-filter: blur(12px) saturate(1.08);
        }
        .auth-tabs {
            display: flex;
            gap: 8px;
            padding: 6px;
            border-radius: 999px;
            background: rgba(204, 120, 92, 0.06);
        }
        .auth-tab {
            flex: 1;
            border: none;
            border-radius: 999px;
            background: transparent;
            color: var(--muted);
            font-size: 15px;
            font-weight: 700;
            padding: 12px 14px;
            cursor: pointer;
        }
        .auth-tab.active {
            background: #fff;
            color: var(--primary);
            box-shadow: 0 10px 18px -14px rgba(50, 40, 35, 0.45);
        }
        .auth-form {
            display: none;
            margin-top: 22px;
        }
        .auth-form.active {
            display: block;
        }
        .auth-field {
            margin-bottom: 14px;
        }
        .auth-field label {
            display: block;
            margin-bottom: 8px;
            color: var(--ink);
            font-size: 14px;
            font-weight: 600;
        }
        .auth-field input {
            width: 100%;
            box-sizing: border-box;
            padding: 13px 14px;
            border: 1px solid var(--hairline);
            border-radius: 12px;
            background: #fff;
            color: var(--ink);
            font-size: 15px;
        }
        .auth-field input:focus {
            outline: none;
            border-color: rgba(204, 120, 92, 0.58);
            box-shadow: 0 0 0 3px rgba(204, 120, 92, 0.12);
        }
        .auth-submit {
            width: 100%;
            justify-content: center;
            margin-top: 8px;
        }
        .auth-switch {
            margin-top: 14px;
            color: var(--muted);
            font-size: 14px;
            text-align: center;
        }
        .auth-switch button {
            border: none;
            background: none;
            color: var(--primary);
            font: inherit;
            font-weight: 700;
            cursor: pointer;
            padding: 0;
        }
        .auth-note {
            margin-top: 16px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.65;
        }
        .auth-status {
            min-height: 24px;
            margin-top: 14px;
            color: var(--primary-active);
            font-size: 14px;
            font-weight: 600;
            line-height: 1.5;
        }
        .auth-status.error {
            color: #a03f2a;
        }
        @media (max-width: 992px) {
            .auth-shell {
                grid-template-columns: 1fr;
            }
            .auth-panel {
                order: -1;
            }
        }
        @media (max-width: 640px) {
            .auth-page {
                padding: 20px 14px 28px;
            }
            .auth-panel {
                padding: 20px 16px;
                border-radius: 20px;
            }
            .auth-tabs {
                flex-direction: column;
                border-radius: 18px;
            }
        }
    </style>
</head>
<body>
<div class="auth-page">
    <a class="auth-back" href="index.html"><i class="fa-solid fa-arrow-left"></i> 返回首页</a>
    <div class="auth-shell">
        <section class="auth-copy">
            <p class="auth-eyebrow">登录 / 注册入口</p>
            <h1 class="auth-title serif">成为/已是注册用户</h1>
            <p class="auth-intro">注册后可以保留学习进度；登录后继续上次浏览的研究路径。游客模式仍然保留，随时可以直接进入科研流程。</p>
            <div class="auth-summary">
                <div class="auth-summary-item">
                    <i class="fa-solid fa-circle-check"></i>
                    <div>
                        <strong>账号注册后可直接进入</strong>
                        <span>用同一套入口完成注册与登录，减少重复跳转。</span>
                    </div>
                </div>
                <div class="auth-summary-item">
                    <i class="fa-solid fa-bookmark"></i>
                    <div>
                        <strong>适合长期使用</strong>
                        <span>后续可扩展为收藏、进度记录。</span>
                    </div>
                </div>
                <div class="auth-summary-item">
                    <i class="fa-solid fa-user-astronaut"></i>
                    <div>
                        <strong>游客入口不受影响</strong>
                        <span>如果只想快速开始，仍然可以回到首页直接进入。</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="auth-panel" aria-label="登录注册面板">
            <div class="auth-tabs" role="tablist" aria-label="登录和注册切换">
                <button class="auth-tab active" type="button" data-tab="login" role="tab">登录</button>
                <button class="auth-tab" type="button" data-tab="register" role="tab">注册</button>
            </div>

            <form class="auth-form active" id="login-form">
                <div class="auth-field">
                    <label for="login-username">用户名</label>
                    <input id="login-username" name="username" type="text" autocomplete="username" required>
                </div>
                <div class="auth-field">
                    <label for="login-password">密码</label>
                    <input id="login-password" name="password" type="password" autocomplete="current-password" required>
                </div>
                <button class="btn-primary interactive-hover-btn auth-submit" type="submit">
                    <span class="interactive-hover-btn__bg" aria-hidden="true"></span>
                    <span class="interactive-hover-btn__text">登录并继续</span>
                    <span class="interactive-hover-btn__icon" aria-hidden="true">
                        <span class="interactive-hover-btn__icon-inner">→</span>
                    </span>
                </button>
                <div class="auth-switch">还没有账号？<button type="button" data-switch="register">先注册</button></div>
            </form>

            <form class="auth-form" id="register-form">
                <div class="auth-field">
                    <label for="register-username">用户名</label>
                    <input id="register-username" name="username" type="text" autocomplete="username" required>
                </div>
                <div class="auth-field">
                    <label for="register-display-name">显示名称</label>
                    <input id="register-display-name" name="display_name" type="text" autocomplete="nickname" placeholder="可选">
                </div>
                <div class="auth-field">
                    <label for="register-password">密码</label>
                    <input id="register-password" name="password" type="password" autocomplete="new-password" required>
                </div>
                <div class="auth-field">
                    <label for="register-password-confirm">确认密码</label>
                    <input id="register-password-confirm" name="password_confirm" type="password" autocomplete="new-password" required>
                </div>
                <button class="btn-primary interactive-hover-btn auth-submit" type="submit">
                    <span class="interactive-hover-btn__bg" aria-hidden="true"></span>
                    <span class="interactive-hover-btn__text">注册并进入</span>
                    <span class="interactive-hover-btn__icon" aria-hidden="true">
                        <span class="interactive-hover-btn__icon-inner">→</span>
                    </span>
                </button>
                <div class="auth-switch">已经有账号？<button type="button" data-switch="login">去登录</button></div>
            </form>

            <p class="auth-note">当前仅开放账号密码注册与登录。</p>
            <p id="auth-status" class="auth-status" aria-live="polite"></p>
        </section>
    </div>
</div>
<footer>
    <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
        <span>心研坊 · 心理学研究方法辅助平台</span>
        <span>本网站部分 UI 组件来源于开源组件库Inspira UI，基于 MIT 协议使用。</span>
        <span>开发共建中</span>
    </div>
</footer>
<script>
    const tabs = Array.from(document.querySelectorAll('.auth-tab'));
    const forms = Array.from(document.querySelectorAll('.auth-form'));
    const statusEl = document.getElementById('auth-status');
    function setStatus(message, isError) {
        statusEl.textContent = message || '';
        statusEl.classList.toggle('error', !!isError);
    }

    function setTab(tabName) {
        tabs.forEach(function(tab) {
            tab.classList.toggle('active', tab.dataset.tab === tabName);
        });
        forms.forEach(function(form) {
            form.classList.toggle('active', form.id === tabName + '-form');
        });
        setStatus('');
    }

    function persistSession(payload) {
        sessionStorage.setItem('xinyanfang_logged_in', 'true');
        if (payload && payload.access_token) {
            sessionStorage.setItem('xinyanfang_access_token', payload.access_token);
        }
        if (payload && payload.refresh_token) {
            sessionStorage.setItem('xinyanfang_refresh_token', payload.refresh_token);
        }
        if (payload && payload.user) {
            sessionStorage.setItem('xinyanfang_user', JSON.stringify(payload.user));
        }
        window.location.href = 'home.html';
    }

    async function postJson(url, data) {
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data),
        });
        const payload = await response.json().catch(function() { return {}; });
        if (!response.ok) {
            throw new Error(payload.error || '请求失败，请稍后再试');
        }
        return payload;
    }

    tabs.forEach(function(tab) {
        tab.addEventListener('click', function() {
            setTab(tab.dataset.tab);
        });
    });

    document.querySelectorAll('[data-switch]').forEach(function(btn) {
        btn.addEventListener('click', function() {
            setTab(btn.getAttribute('data-switch'));
        });
    });

    document.getElementById('login-form').addEventListener('submit', async function(event) {
        event.preventDefault();
        const submitBtn = event.target.querySelector('button[type="submit"]');
        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value;
        if (!username || !password) {
            setStatus('请输入用户名和密码。', true);
            return;
        }
        submitBtn.disabled = true;
        setStatus('正在登录...');
        try {
            const payload = await postJson('/api/auth/login', { username: username, password: password });
            persistSession(payload);
        } catch (error) {
            setStatus(error.message, true);
            submitBtn.disabled = false;
        }
    });

    document.getElementById('register-form').addEventListener('submit', async function(event) {
        event.preventDefault();
        const submitBtn = event.target.querySelector('button[type="submit"]');
        const username = document.getElementById('register-username').value.trim();
        const displayName = document.getElementById('register-display-name').value.trim();
        const password = document.getElementById('register-password').value;
        const confirmPassword = document.getElementById('register-password-confirm').value;
        if (!username || !password) {
            setStatus('请输入用户名和密码。', true);
            return;
        }
        if (password !== confirmPassword) {
            setStatus('两次输入的密码不一致。', true);
            return;
        }
        submitBtn.disabled = true;
        setStatus('正在注册...');
        try {
            const payload = await postJson('/api/auth/register', {
                username: username,
                display_name: displayName,
                password: password,
            });
            persistSession(payload);
        } catch (error) {
            setStatus(error.message, true);
            submitBtn.disabled = false;
        }
    });
</script>
</body>
</html>
