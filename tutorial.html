<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心研坊 · 教程</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .tutorial-page-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 3rem 2rem;
            text-align: center;
        }
        .tutorial-placeholder {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 3rem 2rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }
        .tutorial-placeholder .tp-icon {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }
        .back-btn {
            display: inline-block;
            padding: 0.7rem 2rem;
            border-radius: 50px;
            background: var(--primary);
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            transition: all var(--transition);
        }
        .back-btn:hover { background: var(--primary-active); transform: translateY(-2px); }
    </style>
</head>
<body>
<div class="top-nav">
    <a href="home.html" class="logo"><i class="fa-solid fa-brain"></i> 心研坊</a>
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="搜索教程、资源..." autocomplete="off">
        <button onclick="handleSearch()"><i class="fa-solid fa-magnifying-glass"></i></button>
    </div>
    <button class="nav-toggle" onclick="toggleNav()"><i class="fa-solid fa-bars"></i></button>
    <div class="nav-links" id="navLinks">
        <a href="home.html">首页</a>
        <a href="workflow.html">掌握科研流程</a>
        <a href="aesthetics.html">提升科研审美</a>
        <a href="resources.html">获取科研资源</a>
        <a href="about.html">关于</a>
    </div>
</div>
<div class="tutorial-page-container">
    <div class="tutorial-placeholder">
        <div class="tp-icon"><i class="fa-solid fa-book-open-reader"></i></div>
        <h2 id="tutorial-title">教程页面</h2>
        <p id="tutorial-desc">该教程内容正在建设中，敬请期待……</p>
        <button class="back-btn" onclick="history.back()">← 返回上一页</button>
    </div>
</div>
<footer>
    <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
        <span>心研坊 · 心理学研究方法辅助平台</span>
        <span>面向应用心理学本硕 · 开放共建中</span>
    </div>
</footer>
<script src="js/common.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const title = urlParams.get('title');
    if (title) {
        document.getElementById('tutorial-title').textContent = decodeURIComponent(title);
        document.getElementById('tutorial-desc').textContent = '「' + decodeURIComponent(title) + '」的详细教程正在建设中，敬请期待……';
    }
</script>
</body>
</html>
