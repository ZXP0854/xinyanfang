<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心研坊 · 教程详情</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=29">
</head>
<body>
<div class="top-nav">
    <a href="index.html" class="logo"><img src="logo.png" alt="心研坊" style="height:36px;"></a>
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="搜索教程、资源..." autocomplete="off">
        <button onclick="handleSearch()"><i class="fa-solid fa-magnifying-glass"></i></button>
    </div>
    <button class="nav-toggle" onclick="toggleNav()"><i class="fa-solid fa-bars"></i></button>
    <div class="nav-links" id="navLinks">
        <a href="home.html">首页</a>
        <a href="workflow.html">掌握科研流程</a>
        <a href="aesthetics.html">提升科研审美</a>
        <a href="resources.html">获取科研资源</a>
        <a href="about.html">关于与简介</a>
    </div>
</div>

<article class="article-container" id="article-container">
    <div class="article-loading" id="article-loading">
        <i class="fa-solid fa-spinner fa-pulse"></i>
        <p>加载中……</p>
    </div>
    <div class="article-error" id="article-error" style="display:none;">
        <i class="fa-solid fa-circle-exclamation"></i>
        <p id="article-error-msg">教程加载失败</p>
        <a href="javascript:history.back()" class="article-back-link">← 返回</a>
    </div>
    <div id="article-content" style="display:none;">
        <header class="article-header">
            <span class="article-category" id="article-category"></span>
            <h1 class="article-title" id="article-title"></h1>
            <div class="article-meta">
                <span>心研坊</span>
                <span class="article-date" id="article-date"></span>
            </div>
        </header>
        <div class="article-body" id="article-body"></div>
        <footer class="article-footer">
            <a href="javascript:history.back()" class="article-back-link">← 返回</a>
        </footer>
    </div>
</article>

<footer>
    <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
        <span>心研坊 · 心理学研究方法辅助平台</span>
        <span>开发共建中</span>
    </div>
</footer>

<div id="image-modal" class="image-modal" aria-hidden="true">
    <div class="modal-box">
        <button class="modal-close" aria-label="关闭">&times;</button>
        <img class="modal-img" src="" alt="">
    </div>
</div>

<script src="js/common.js?v=25"></script>
<script>
(function() {
    var urlParams = new URLSearchParams(window.location.search);
    var title = urlParams.get('title');

    if (!title) {
        document.getElementById('article-loading').style.display = 'none';
        document.getElementById('article-error').style.display = 'block';
        document.getElementById('article-error-msg').textContent = '未指定教程标题';
        return;
    }

    var decodedTitle = decodeURIComponent(title);
    document.title = decodedTitle + ' · 心研坊';
    document.getElementById('article-title').textContent = decodedTitle;

    fetch('/api/tutorials/by-title/' + encodeURIComponent(decodedTitle))
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (!data.tutorial || !data.tutorial.content) {
                throw new Error('暂无内容');
            }
            render(data.tutorial);
        })
        .catch(function(e) {
            document.getElementById('article-loading').style.display = 'none';
            document.getElementById('article-error').style.display = 'block';
            document.getElementById('article-error-msg').textContent =
                '「' + decodedTitle + '」的教程正在建设中……';
        });

    function render(t) {
        document.getElementById('article-loading').style.display = 'none';
        document.getElementById('article-content').style.display = 'block';

        var cat = t.category || '';
        document.getElementById('article-category').textContent =
            cat === 'aesthetics' ? '提升科研审美' :
            cat === 'workflow' ? '科研流程' : cat;

        if (t.updated_at || t.created_at) {
            var d = new Date(t.updated_at || t.created_at);
            document.getElementById('article-date').textContent =
                d.getFullYear() + '-' +
                String(d.getMonth()+1).padStart(2,'0') + '-' +
                String(d.getDate()).padStart(2,'0');
        }

        var html = t.content || '';
        // 非PDF内容 → 转换为文章排版格式
        html = html
            .replace(/<div class="tutorial-rich">/g, '')
            .replace(/<div class="rich-divider"><\/div>/g, '')
            .replace(/<div class="rich-block">/g, '<div class="ablock">')
            .replace(/<div class="rich-text">/g, '<div class="atext">')
            .replace(/<\/div>\s*<\/div>\s*$/g, '</div>')
            .replace(/<h4>/g, '<h3 class="ah3">')
            .replace(/<\/h4>/g, '</h3>');
        html = html.replace(/<img([^>]*)>/g, '<div class="aimg"><img$1></div>');

        document.getElementById('article-body').innerHTML = html;
        fixPdfEmbeds();

        // 图片点击放大
        [].forEach.call(document.querySelectorAll('.article-body img'), function(img) {
            img.style.cursor = 'pointer';
            img.addEventListener('click', function() {
                var m = document.getElementById('image-modal');
                m.querySelector('.modal-img').src = img.src;
                m.classList.add('visible');
                m.setAttribute('aria-hidden', 'false');
                document.body.style.overflow = 'hidden';
            });
        });
    }
})();
</script>
</body>
</html>
