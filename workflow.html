<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心研坊 · 掌握科研流程</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="top-nav">
    <a href="home.html" class="logo">心研坊</a>
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="搜索教程、资源..." autocomplete="off">
        <button onclick="handleSearch()"><i class="fa-solid fa-magnifying-glass"></i></button>
    </div>
    <button class="nav-toggle" onclick="toggleNav()"><i class="fa-solid fa-bars"></i></button>
    <div class="nav-links" id="navLinks">
        <a href="home.html">首页</a>
        <a href="workflow.html">掌握科研流程</a>
        <a href="aesthetics.html">提升科研审美</a>
        <a href="resources.html">获取科研资源</a>
        <a href="about.html">关于</a>
    </div>
</div>
<div class="container" style="padding-top: 32px;">
    <h2 class="serif serif-sm">掌握科研流程</h2>
    <p class="muted" style="margin-bottom: 16px;">点击左侧任意节点，查看详细教程框架</p>
    <div class="flow-layout">
        <div class="tree-sidebar" id="tree-container"></div>
        <div class="detail-area" id="tutorial-detail">
            <div class="detail-title"><h3 class="serif serif-xs">选择教程节点</h3></div>
            <div id="detail-content"><p>请从左侧树状图中选择一个研究方法步骤，右侧将显示详细教程框架。</p></div>
        </div>
    </div>
</div>
<footer>
    <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
        <span>心研坊 · 心理学研究方法辅助平台</span>
        <span>面向应用心理学本硕 · 开放共建中</span>
    </div>
</footer>
<!-- 图片放大模态层（用于图文教程） -->
<div id="image-modal" class="image-modal" aria-hidden="true">
    <div class="modal-box">
        <button class="modal-close" aria-label="关闭图片">×</button>
        <img class="modal-img" src="" alt="">
    </div>
</div>
<script src="js/common.js"></script>
<script>
    document.getElementById('tree-container').innerHTML = buildTreeHTML();
    attachTreeEvents();
    const urlParams = new URLSearchParams(window.location.search);
    const stage = urlParams.get('stage');
    if (stage) {
        const firstId = getFirstNodeIdByStage(parseInt(stage));
        if (firstId) {
            setTimeout(() => {
                const targetNode = document.querySelector(`.tree-node-level1[data-id="${firstId}"], .tree-node-level2[data-id="${firstId}"]`);
                if (targetNode) {
                    targetNode.click();
                    targetNode.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 100);
        }
    }
</script>
</body>
</html>
